name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            ext: ""
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux cross-compilation dependencies
        if: contains(matrix.target, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            patchelf

      - name: Set aarch64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          PKG_NAME=docker-shell
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET=${{ matrix.target }}
          EXT=${{ matrix.ext }}
          ARCHIVE=${{ matrix.archive }}

          BINARY="target/$TARGET/release/${PKG_NAME}${EXT}"
          ARCHIVE_NAME="${PKG_NAME}_${VERSION}_${TARGET}.${ARCHIVE}"

          mkdir -p dist

          if [ "$ARCHIVE" = "zip" ]; then
            cp "$BINARY" "${PKG_NAME}${EXT}"
            7z a "dist/$ARCHIVE_NAME" "${PKG_NAME}${EXT}"
          else
            tar czf "dist/$ARCHIVE_NAME" -C "target/$TARGET/release" "${PKG_NAME}${EXT}"
          fi

          echo "artifact=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
        id: package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact }}
          path: dist/${{ steps.package.outputs.artifact }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          generate_release_notes: true
          files: artifacts/*
